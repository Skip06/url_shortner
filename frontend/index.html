<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Shortener</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>URL Shortener</h1>
            <p>Paste your long URL below to get a short, manageable link.</p>
        </header>
        
        <main>
            <form id="shorten-form">
                <div class="input-group">
                    <input type="url" id="url-input" placeholder="https://example.com/very/long/url" required>
                    <button type="submit">Shorten</button>
                </div>
            </form>

            <div id="result-container" class="hidden">
                <p>Your shortened URL:</p>
                <div class="result-box">
                    <a id="shortened-url" href="#" target="_blank"></a>
                    <button id="copy-btn" title="Copy to clipboard">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    </button>
                </div>
            </div>

            <div id="error-container" class="hidden">
                <p id="error-message"></p>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>

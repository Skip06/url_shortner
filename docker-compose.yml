services:
  db:
    image: postgres:16-alpine
    container_name: url_shortner_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: url_shortner
      POSTGRES_PASSWORD: url_shortner
      POSTGRES_DB: url_shortner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U url_shortner -d url_shortner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
